name: Skills Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Validate all skills
        run: |
          for dir in */; do
            if [ -f "${dir}SKILL.md" ]; then
              echo "Validating ${dir%/}..."
              npx skills-ref validate "$dir"
            fi
          done
